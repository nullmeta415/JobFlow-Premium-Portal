{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card job-card p-5 shadow-lg glass-card" style="max-width: 450px; width: 100%; border-radius: 25px;" data-aos="zoom-in">
        <div class="text-center mb-4">
            <div class="mb-3 display-6">🔐</div>
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Enter your details to continue</p>
        </div>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" name="email" class="form-control rounded-pill px-3" placeholder="email@address.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control rounded-pill px-3" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow">
                Sign In
            </button>
        </form>
        
        <div class="text-center mt-4">
            <span class="small text-muted">New here? <a href="/signup" class="text-primary text-decoration-none fw-bold">Create Account</a></span>
        </div>
    </div>
</div>
{% endblock %}
